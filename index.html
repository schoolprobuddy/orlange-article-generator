<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Orlange — FB Article Generator</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #1a1208;
    --cream: #fdf8f0;
    --amber: #c8860a;
    --amber-light: #f5e6c0;
    --amber-dark: #9a6500;
    --muted: #7a6a52;
    --border: #e8dcc8;
    --card: #ffffff;
    --success: #2d7a3a;
    --radius: 12px;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--cream);
    color: var(--ink);
    min-height: 100vh;
    padding: 0 0 60px;
  }

  /* ── Header ── */
  header {
    background: var(--ink);
    padding: 18px 32px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  header .logo-mark {
    width: 38px; height: 38px;
    background: var(--amber);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }
  header h1 {
    font-family: 'Playfair Display', serif;
    color: #fff;
    font-size: 1.2rem;
    font-weight: 700;
    letter-spacing: 0.01em;
  }
  header span {
    color: var(--amber);
    font-size: 0.75rem;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-left: auto;
    opacity: 0.85;
  }

  /* ── Layout ── */
  .wrap {
    max-width: 860px;
    margin: 0 auto;
    padding: 40px 20px 0;
  }

  .page-title {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    font-weight: 900;
    color: var(--ink);
    margin-bottom: 6px;
  }
  .page-sub {
    color: var(--muted);
    font-size: 0.92rem;
    margin-bottom: 32px;
  }

  /* ── Card ── */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px;
    margin-bottom: 24px;
  }
  .card-label {
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--amber-dark);
    margin-bottom: 14px;
  }

  /* ── Topic input area ── */
  .topic-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }
  .topic-row .field {
    flex: 1;
  }
  label {
    display: block;
    font-size: 0.82rem;
    font-weight: 500;
    color: var(--muted);
    margin-bottom: 6px;
  }
  input[type="text"], textarea, select {
    width: 100%;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 11px 14px;
    font-family: 'Inter', sans-serif;
    font-size: 0.92rem;
    color: var(--ink);
    background: var(--cream);
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="text"]:focus, textarea:focus, select:focus {
    border-color: var(--amber);
    background: #fff;
  }

  /* ── Suggested topics ── */
  .suggestions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 14px;
  }
  .suggestion-pill {
    background: var(--amber-light);
    color: var(--amber-dark);
    border: none;
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 0.8rem;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
  }
  .suggestion-pill:hover {
    background: var(--amber);
    color: #fff;
    transform: translateY(-1px);
  }

  /* ── Options row ── */
  .options-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-top: 16px;
  }

  /* ── Generate button ── */
  .btn-generate {
    width: 100%;
    background: var(--amber);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 14px;
    font-family: 'Inter', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    margin-top: 20px;
    transition: background 0.2s, transform 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .btn-generate:hover:not(:disabled) {
    background: var(--amber-dark);
    transform: translateY(-1px);
  }
  .btn-generate:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    transform: none;
  }

  /* ── Loader ── */
  .loader {
    display: none;
    text-align: center;
    padding: 40px;
    color: var(--muted);
    font-size: 0.9rem;
  }
  .loader.active { display: block; }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--amber);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Output area ── */
  .output-area { display: none; }
  .output-area.active { display: block; }

  /* ── Image preview ── */
  .image-block {
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 20px;
    position: relative;
    background: var(--border);
    height: 240px;
  }
  .image-block img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }
  .image-credit {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: rgba(0,0,0,0.45);
    color: #fff;
    font-size: 0.7rem;
    padding: 5px 10px;
    text-decoration: none;
  }
  .image-credit a { color: #ffd97a; }

  /* ── Article preview ── */
  .article-preview {
    background: var(--cream);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 22px;
    font-size: 0.93rem;
    line-height: 1.75;
    white-space: pre-wrap;
    word-break: break-word;
    color: var(--ink);
    min-height: 120px;
    max-height: 480px;
    overflow-y: auto;
  }

  /* ── CTA strip ── */
  .cta-strip {
    background: linear-gradient(135deg, var(--ink) 0%, #2d2010 100%);
    border-radius: 10px;
    padding: 16px 20px;
    margin-top: 16px;
    color: #fff;
    font-size: 0.86rem;
    line-height: 1.6;
  }
  .cta-strip strong { color: var(--amber); }

  /* ── Action buttons ── */
  .action-row {
    display: flex;
    gap: 10px;
    margin-top: 16px;
    flex-wrap: wrap;
  }
  .btn {
    border-radius: 8px;
    padding: 10px 18px;
    font-family: 'Inter', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
    display: flex; align-items: center; gap: 6px;
  }
  .btn-copy {
    background: var(--amber);
    color: #fff;
    flex: 1;
  }
  .btn-copy:hover { background: var(--amber-dark); }
  .btn-copy.copied { background: var(--success); }
  .btn-regen {
    background: var(--cream);
    color: var(--ink);
    border: 1.5px solid var(--border);
  }
  .btn-regen:hover { background: var(--amber-light); border-color: var(--amber); }
  .btn-img {
    background: var(--cream);
    color: var(--ink);
    border: 1.5px solid var(--border);
  }
  .btn-img:hover { background: var(--amber-light); border-color: var(--amber); }

  /* ── CTA editor ── */
  .cta-editor {
    margin-top: 20px;
    padding-top: 18px;
    border-top: 1px solid var(--border);
  }
  .cta-editor label { margin-bottom: 6px; }
  .cta-editor textarea {
    font-size: 0.85rem;
    line-height: 1.6;
    min-height: 72px;
    resize: vertical;
  }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: 28px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--ink);
    color: #fff;
    padding: 12px 22px;
    border-radius: 30px;
    font-size: 0.85rem;
    font-weight: 500;
    transition: transform 0.3s ease;
    z-index: 999;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  @media (max-width: 540px) {
    .options-row { grid-template-columns: 1fr; }
    .topic-row { flex-direction: column; }
    header span { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="logo-mark">🎵</div>
  <h1>Orlange Music Shoppe</h1>
  <span>FB Article Generator</span>
</header>

<div class="wrap">
  <p class="page-title">Write. Copy. Post.</p>
  <p class="page-sub">Generate engaging Facebook music articles with your shop's CTA built in — ready to copy and post.</p>

  <!-- Input Card -->
  <div class="card">
    <p class="card-label">Article topic</p>

    <div class="topic-row">
      <div class="field">
        <label for="topicInput">Enter a topic or keyword</label>
        <input type="text" id="topicInput" placeholder="e.g. How playing guitar improves mental health" />
      </div>
    </div>

    <div class="suggestions">
      <button class="suggestion-pill" onclick="setTopic('How playing an instrument benefits your brain')">🧠 Brain benefits of music</button>
      <button class="suggestion-pill" onclick="setTopic('Best starter guitar for beginners in the Philippines')">🎸 Starter guitar tips</button>
      <button class="suggestion-pill" onclick="setTopic('Why every child should learn music')">👧 Music for kids</button>
      <button class="suggestion-pill" onclick="setTopic('How to choose the right keyboard for beginners')">🎹 Picking a keyboard</button>
      <button class="suggestion-pill" onclick="setTopic('The mental health benefits of playing drums')">🥁 Drumming & wellness</button>
      <button class="suggestion-pill" onclick="setTopic('Top tips for keeping your guitar in great condition')">🔧 Guitar maintenance</button>
    </div>

    <div class="options-row">
      <div>
        <label for="toneSelect">Tone</label>
        <select id="toneSelect">
          <option value="friendly and informative">Friendly & informative</option>
          <option value="fun and engaging">Fun & engaging</option>
          <option value="inspiring and motivational">Inspiring & motivational</option>
          <option value="educational and professional">Educational & professional</option>
        </select>
      </div>
      <div>
        <label for="lengthSelect">Post length</label>
        <select id="lengthSelect">
          <option value="medium (250–350 words)">Medium (250–350 words)</option>
          <option value="short (120–180 words)">Short (120–180 words)</option>
          <option value="long (400–500 words)">Long (400–500 words)</option>
        </select>
      </div>
    </div>

    <!-- Editable CTA -->
    <div class="cta-editor">
      <label for="ctaText">Shop CTA (appended to every post — edit to your liking)</label>
      <textarea id="ctaText">🎵 Ready to start your musical journey? Visit Orlange Music Shoppe in San Pablo City, Laguna — where every instrument tells a story. Browse our collection online at orlangemusicshoppe.com 🎶</textarea>
    </div>

    <button class="btn-generate" id="genBtn" onclick="generateArticle()">
      <span id="genBtnIcon">✨</span>
      <span id="genBtnText">Generate Article</span>
    </button>
  </div>

  <!-- Loader -->
  <div class="loader" id="loader">
    <div class="spinner"></div>
    <p id="loaderMsg">Writing your article…</p>
  </div>

  <!-- Output Card -->
  <div class="card output-area" id="outputArea">
    <p class="card-label">Generated post</p>

    <div class="image-block" id="imageBlock">
      <img id="articleImage" src="" alt="Article image" />
      <span class="image-credit" id="imageCredit"></span>
    </div>

    <div class="article-preview" id="articleText"></div>

    <div class="cta-strip" id="ctaPreview"></div>

    <div class="action-row">
      <button class="btn btn-copy" id="copyBtn" onclick="copyPost()">📋 Copy Full Post</button>
      <button class="btn btn-img" onclick="refreshImage()">🖼 New Image</button>
      <button class="btn btn-regen" onclick="generateArticle()">🔄 Regenerate</button>
    </div>
  </div>
</div>

<div class="toast" id="toast">✅ Copied to clipboard!</div>

<script>
const UNSPLASH_ACCESS_KEY = 'ZFPjGEBPtFc1mVJrJBXQA8A6V7hmpqV0hn9gEh7Mxls'; // demo key – replace with yours if needed

let currentImageUrl = '';
let currentImageCredit = '';
let currentArticle = '';
let currentTopic = '';

const loaderMessages = [
  'Tuning up the article…',
  'Composing your post…',
  'Writing the perfect hook…',
  'Adding the finishing notes…',
];

function setTopic(text) {
  document.getElementById('topicInput').value = text;
  document.getElementById('topicInput').focus();
}

async function fetchImage(topic) {
  const query = encodeURIComponent(topic + ' music instrument');
  try {
    const res = await fetch(`https://api.unsplash.com/search/photos?query=${query}&per_page=10&orientation=landscape&client_id=${UNSPLASH_ACCESS_KEY}`);
    const data = await res.json();
    if (data.results && data.results.length > 0) {
      const idx = Math.floor(Math.random() * Math.min(5, data.results.length));
      const photo = data.results[idx];
      currentImageUrl = photo.urls.regular;
      currentImageCredit = `Photo by <a href="${photo.user.links.html}?utm_source=orlange_music&utm_medium=referral" target="_blank">${photo.user.name}</a> on <a href="https://unsplash.com?utm_source=orlange_music&utm_medium=referral" target="_blank">Unsplash</a>`;
    } else {
      // fallback: generic music photo
      currentImageUrl = `https://source.unsplash.com/featured/800x400/?music,instrument`;
      currentImageCredit = '';
    }
  } catch(e) {
    currentImageUrl = `https://source.unsplash.com/featured/800x400/?music,instrument`;
    currentImageCredit = '';
  }
}

async function refreshImage() {
  if (!currentTopic) return;
  const imgEl = document.getElementById('articleImage');
  imgEl.style.opacity = '0.4';
  await fetchImage(currentTopic);
  imgEl.src = currentImageUrl;
  imgEl.style.opacity = '1';
  document.getElementById('imageCredit').innerHTML = currentImageCredit;
}

async function generateArticle() {
  const topic = document.getElementById('topicInput').value.trim();
  if (!topic) {
    document.getElementById('topicInput').focus();
    showToast('⚠️ Please enter a topic first.');
    return;
  }

  currentTopic = topic;
  const tone = document.getElementById('toneSelect').value;
  const length = document.getElementById('lengthSelect').value;

  // UI: loading state
  document.getElementById('genBtn').disabled = true;
  document.getElementById('genBtnText').textContent = 'Writing…';
  document.getElementById('loader').classList.add('active');
  document.getElementById('outputArea').classList.remove('active');

  let msgIdx = 0;
  const loaderInterval = setInterval(() => {
    document.getElementById('loaderMsg').textContent = loaderMessages[msgIdx % loaderMessages.length];
    msgIdx++;
  }, 1800);

  // fetch image + article in parallel
  const [_, articleResult] = await Promise.all([
    fetchImage(topic),
    callClaudeAPI(topic, tone, length)
  ]);

  clearInterval(loaderInterval);
  document.getElementById('loader').classList.remove('active');

  if (articleResult) {
    currentArticle = articleResult;

    // Show image
    const imgEl = document.getElementById('articleImage');
    imgEl.src = currentImageUrl;
    document.getElementById('imageCredit').innerHTML = currentImageCredit;

    // Show article
    document.getElementById('articleText').textContent = articleResult;

    // Show CTA preview
    const cta = document.getElementById('ctaText').value.trim();
    document.getElementById('ctaPreview').innerHTML = cta.replace(/\n/g, '<br>');

    document.getElementById('outputArea').classList.add('active');
    document.getElementById('outputArea').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  document.getElementById('genBtn').disabled = false;
  document.getElementById('genBtnText').textContent = 'Generate Article';
}

async function callClaudeAPI(topic, tone, length) {
  const prompt = `You are a social media content writer for Orlange Music Shoppe, a beloved family-owned music instrument store in San Pablo City, Laguna, Philippines with 8 years of experience. They sell guitars, drums, keyboards, brass instruments, amps, and accessories.

Write a Facebook post article about: "${topic}"

Requirements:
- Tone: ${tone}
- Length: ${length}
- Start with an attention-grabbing first line or question (no hashtags at the start)
- Write in a warm, community-focused voice that resonates with Filipino music lovers
- Include practical, genuinely useful insights about the topic
- End the article body naturally — do NOT include a shop call-to-action at the end (that will be added separately)
- Add 3–5 relevant emojis throughout naturally (not all at the end)
- Add 5–8 relevant hashtags at the very end on their own line (include #OrlangeMusica #SanPabloCity #MusicPH)
- Do NOT include any greeting like "Hello!" or "Hi everyone!" at the start
- Output only the article text, nothing else`;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompt }]
      })
    });
    const data = await response.json();
    if (data.content && data.content[0]) {
      return data.content[0].text.trim();
    } else {
      showToast('❌ API error. Check console.');
      console.error(data);
      return null;
    }
  } catch(e) {
    showToast('❌ Network error.');
    console.error(e);
    return null;
  }
}

function copyPost() {
  const article = document.getElementById('articleText').textContent;
  const cta = document.getElementById('ctaText').value.trim();
  const fullPost = article + '\n\n' + cta;

  navigator.clipboard.writeText(fullPost).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = '✅ Copied!';
    btn.classList.add('copied');
    showToast('✅ Post copied to clipboard!');
    setTimeout(() => {
      btn.innerHTML = '📋 Copy Full Post';
      btn.classList.remove('copied');
    }, 2500);
  }).catch(() => {
    // fallback
    const ta = document.createElement('textarea');
    ta.value = fullPost;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('✅ Copied!');
  });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// Update CTA preview live as user types
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('ctaText').addEventListener('input', () => {
    const cta = document.getElementById('ctaText').value.trim();
    document.getElementById('ctaPreview').innerHTML = cta.replace(/\n/g, '<br>');
  });
});
</script>
</body>
</html>
